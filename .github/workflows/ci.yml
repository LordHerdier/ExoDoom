name: ExoDoom CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build + test (QEMU)
        run: |
          set -euo pipefail

          output="$(make docker-ci 2>&1 || true)"
          echo "$output"

          if grep -q "TESTS FAILED" <<<"$output"; then
            echo "One or more tests failed!"
            exit 1
          fi

          if ! grep -q "ALL TESTS PASSED" <<<"$output"; then
            echo "Test completion signal not found in serial output!"
            exit 1
          fi

      - name: Success
        run: echo "All kernel tests passed."
